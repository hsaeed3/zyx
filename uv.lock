    { name = "pytest-asyncio" },
    { name = "ruff" },
    { name = "twine" },
    { name = "ty" },
    { name = "uv" },
    { name = "zensical" },
]

[package.metadata]
requires-dist = [
    { name = "chromadb", marker = "extra == 'chroma'" },
    { name = "marimo", marker = "extra == 'examples'" },
    { name = "markitdown", specifier = ">=0.1.4" },
    { name = "openai", specifier = ">=2.16.0" },
    { name = "pydantic-ai", marker = "extra == 'ai'" },
    { name = "pydantic-ai-slim", specifier = ">=1.58.0" },
    { name = "pydantic-monty", specifier = ">=0.0.4" },
    { name = "qdrant-client", extras = ["fastembed"], marker = "extra == 'qdrant'" },
    { name = "toonify", specifier = ">=1.6.0" },
]
provides-extras = ["ai", "examples", "chroma", "qdrant"]

[package.metadata.requires-dev]
dev = [
    { name = "black" },
    { name = "isort" },
    { name = "logfire" },
