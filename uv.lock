[[package]]
name = "zyx"
version = "1.0.30"
source = { editable = "." }
dependencies = [
    { name = "markitdown" },
    { name = "openai" },
    { name = "pydantic-ai-slim" },
    { name = "pydantic-monty" },
    { name = "toonify" },
]

[package.optional-dependencies]
ai = [
    { name = "pydantic-ai" },
]
chroma = [
    { name = "chromadb" },
]
examples = [
    { name = "marimo" },
]
qdrant = [
    { name = "qdrant-client", extra = ["fastembed"] },
]

[package.dev-dependencies]
dev = [
    { name = "black" },
    { name = "isort" },
    { name = "logfire" },
    { name = "marimo" },
    { name = "mkdocstrings-python" },
    { name = "prek" },
